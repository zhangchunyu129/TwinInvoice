<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>发票二合一打印</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: light;
      --ink: #18212f;
      --muted: #617084;
      --line: #d8dee8;
      --panel: #f6f8fb;
      --accent: #1b6ef3;
      --warn: #b45309;
      --bad: #b42318;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: #eef2f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button {
      height: 36px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 0 14px;
      color: #fff;
      background: var(--accent);
      font: inherit;
      cursor: pointer;
    }

    button.secondary {
      color: var(--ink);
      border-color: var(--line);
      background: #fff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 100vh;
    }

    .side {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 18px;
      overflow: auto;
      background: #fff;
      border-right: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .drop {
      display: grid;
      place-items: center;
      min-height: 158px;
      padding: 18px;
      border: 2px dashed #9aa8bb;
      border-radius: 8px;
      background: var(--panel);
      text-align: center;
    }

    .drop.dragover {
      border-color: var(--accent);
      background: #edf4ff;
    }

    .drop strong {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }

    .import-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
    }

    .import-copy,
    .hint,
    .meta,
    .file-row small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 14px 0;
    }

    .status {
      min-height: 22px;
      margin: 8px 0 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 14px 0;
    }

    .stat {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .stat b {
      display: block;
      font-size: 20px;
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .files {
      margin-top: 12px;
      border-top: 1px solid var(--line);
    }

    .file-row {
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }

    .file-row b {
      display: block;
      overflow-wrap: anywhere;
      font-weight: 600;
    }

    .file-row.warn b {
      color: var(--warn);
    }

    .file-row.bad b {
      color: var(--bad);
    }

    .workspace {
      padding: 22px;
      overflow: auto;
    }

    .pages {
      display: grid;
      gap: 18px;
      justify-content: center;
    }

    .sheet {
      position: relative;
      width: 210mm;
      height: 297mm;
      display: grid;
      grid-template-rows: 1fr 1fr;
      background: #fff;
      box-shadow: 0 8px 28px rgba(24, 33, 47, .14);
      page-break-after: always;
      break-after: page;
    }

    .sheet:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    .sheet.single {
      grid-template-rows: 1fr;
    }

    .sheet-select {
      position: absolute;
      z-index: 1;
      right: 6mm;
      top: 6mm;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, .94);
      font-size: 13px;
      cursor: pointer;
    }

    .sheet-select input {
      margin: 0;
    }

    .sheet.excluded .slot {
      opacity: .35;
    }

    .slot {
      position: relative;
      display: grid;
      place-items: center;
      padding: 8mm;
      overflow: hidden;
      border-bottom: 1px dashed #c4ccd8;
    }

    .sheet.single .slot,
    .slot:last-child {
      border-bottom: 0;
    }

    .slot img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .badge {
      position: absolute;
      left: 8mm;
      top: 5mm;
      max-width: calc(100% - 16mm);
      padding: 4px 7px;
      border-radius: 5px;
      color: #fff;
      background: rgba(180, 83, 9, .92);
      font-size: 11px;
      line-height: 1.3;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      .side {
        position: static;
        height: auto;
      }

      .workspace {
        padding: 14px;
      }

      .sheet {
        width: min(100%, 210mm);
        height: auto;
        aspect-ratio: 210 / 297;
      }
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 0;
      }

      body {
        background: #fff;
      }

      .side {
        display: none;
      }

      .app {
        display: block;
      }

      .workspace {
        padding: 0;
        overflow: visible;
      }

      .pages {
        display: block;
      }

      .sheet {
        width: 210mm;
        height: 297mm;
        box-shadow: none;
      }

      .sheet.excluded,
      .sheet-select {
        display: none;
      }

      .badge {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="side">
      <h1>发票合并打印</h1>
      <div class="drop" id="dropZone">
        <div class="import-copy">
          <strong>选择发票文件或文件夹</strong>
          支持 PDF、PNG、JPG、WEBP；选择文件夹时会递归读取子文件夹。
          <div class="import-actions">
            <button id="fileSelectBtn" type="button">选择文件（可多选）</button>
            <button id="folderSelectBtn" class="secondary" type="button">选择文件夹</button>
          </div>
        </div>
      </div>
      <input id="fileInput" type="file" accept=".pdf,.png,.jpg,.jpeg,.webp" multiple hidden>
      <input id="folderInput" type="file" webkitdirectory multiple hidden>

      <div class="toolbar">
        <button id="printBtn" disabled>打印</button>
        <button id="clearBtn" class="secondary" disabled>清空</button>
        <button id="downloadBtn" class="secondary" disabled>下载</button>
      </div>

      <div class="status" id="status">等待导入文件或文件夹。</div>

      <div class="stats">
        <div class="stat"><b id="fileCount">0</b><span>文件</span></div>
        <div class="stat"><b id="pageCount">0</b><span>发票页</span></div>
        <div class="stat"><b id="warnCount">0</b><span>单页</span></div>
      </div>

      <div class="hint">
        规则：页面按宽度铺进半张 A4 时，如果高度会超过半张 A4，就判定为不适合二合一，自动单独占一张 A4。
      </div>

      <section class="files" id="fileList"></section>
    </aside>

    <section class="workspace">
      <div class="pages" id="pages">
        <div class="empty">导入后会在这里生成 A4 打印预览。</div>
      </div>
    </section>
  </main>

  <script src="./vendor/pdfjs/pdf.min.js"></script>
  <script>
    const PDFJS_WORKER_URL = "./vendor/pdfjs/pdf.worker.min.js";
    const HALF_A4_RATIO = 210 / (297 / 2);
    const A4_WIDTH_PT = 595.28;
    const A4_HEIGHT_PT = 841.89;
    const PDF_CANVAS_WIDTH = 1240;
    const PDF_CANVAS_HEIGHT = 1754;
    const SUPPORTED = new Set(["pdf", "png", "jpg", "jpeg", "webp"]);

    const dropZone = document.getElementById("dropZone");
    const fileSelectBtn = document.getElementById("fileSelectBtn");
    const folderSelectBtn = document.getElementById("folderSelectBtn");
    const fileInput = document.getElementById("fileInput");
    const folderInput = document.getElementById("folderInput");
    const printBtn = document.getElementById("printBtn");
    const clearBtn = document.getElementById("clearBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const statusEl = document.getElementById("status");
    const pagesEl = document.getElementById("pages");
    const fileListEl = document.getElementById("fileList");
    const fileCountEl = document.getElementById("fileCount");
    const pageCountEl = document.getElementById("pageCount");
    const warnCountEl = document.getElementById("warnCount");

    let pdfjsLibPromise = null;
    let invoicePages = [];
    let printSheets = [];

    fileSelectBtn.addEventListener("click", () => fileInput.click());
    folderSelectBtn.addEventListener("click", () => folderInput.click());
    fileInput.addEventListener("change", () => processFiles([...fileInput.files]));
    folderInput.addEventListener("change", () => processFiles([...folderInput.files]));

    dropZone.addEventListener("dragover", event => {
      event.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", async event => {
      event.preventDefault();
      dropZone.classList.remove("dragover");

      const files = await readDroppedItems(event.dataTransfer);
      processFiles(files);
    });

    printBtn.addEventListener("click", () => window.print());
    clearBtn.addEventListener("click", reset);
    downloadBtn.addEventListener("click", downloadPreview);

    async function loadPdfJs() {
      if (!pdfjsLibPromise) {
        const pdfjs = window.pdfjsLib || window["pdfjs-dist/build/pdf"];
        if (!pdfjs) {
          throw new Error("PDF 解析库加载失败，请确认 vendor/pdfjs 文件夹和本页面放在一起");
        }
        pdfjs.GlobalWorkerOptions.workerSrc = PDFJS_WORKER_URL;
        pdfjsLibPromise = Promise.resolve(pdfjs);
      }

      return pdfjsLibPromise;
    }

    async function readDroppedItems(dataTransfer) {
      const entries = [...dataTransfer.items]
        .map(item => item.webkitGetAsEntry && item.webkitGetAsEntry())
        .filter(Boolean);

      if (!entries.length) {
        return [...dataTransfer.files];
      }

      const files = [];
      for (const entry of entries) {
        await walkEntry(entry, files);
      }
      return files;
    }

    async function walkEntry(entry, files) {
      if (entry.isFile) {
        const file = await new Promise((resolve, reject) => entry.file(resolve, reject));
        file.relativePath = entry.fullPath.replace(/^\/+/, "");
        files.push(file);
        return;
      }

      if (entry.isDirectory) {
        const reader = entry.createReader();
        let batch = [];
        do {
          batch = await new Promise((resolve, reject) => reader.readEntries(resolve, reject));
          for (const child of batch) {
            await walkEntry(child, files);
          }
        } while (batch.length);
      }
    }

    async function processFiles(files) {
      reset();

      const invoiceFiles = files
        .filter(file => SUPPORTED.has(extensionOf(file.name)))
        .sort((a, b) => displayPath(a).localeCompare(displayPath(b), "zh-CN", { numeric: true }));

      if (!invoiceFiles.length) {
        statusEl.textContent = "没有找到 PDF 或图片发票。";
        return;
      }

      clearBtn.disabled = false;
      fileCountEl.textContent = invoiceFiles.length;
      statusEl.textContent = `正在处理 ${invoiceFiles.length} 个文件...`;

      const rows = invoiceFiles.map(file => appendFileRow(file, "等待处理"));

      for (let i = 0; i < invoiceFiles.length; i++) {
        const file = invoiceFiles[i];
        rows[i].querySelector("small").textContent = "处理中";
        statusEl.textContent = `正在处理 ${i + 1}/${invoiceFiles.length}：${displayPath(file)}`;

        try {
          const pages = await renderFile(file);
          invoicePages.push(...pages);
          rows[i].querySelector("small").textContent = `${pages.length} 页`;
          if (pages.some(page => page.single)) {
            rows[i].classList.add("warn");
          }
        } catch (error) {
          rows[i].classList.add("bad");
          rows[i].querySelector("small").textContent = `失败：${error.message}`;
        }

        pageCountEl.textContent = invoicePages.length;
        warnCountEl.textContent = invoicePages.filter(page => page.single).length;
      }

      renderPrintPages(invoicePages);
      printBtn.disabled = invoicePages.length === 0;
      downloadBtn.disabled = invoicePages.length === 0;
      statusEl.textContent = invoicePages.length
        ? `完成：${invoicePages.length} 页发票，${invoicePages.filter(page => page.single).length} 页自动单独打印。`
        : "没有可打印的发票页。";
    }

    function appendFileRow(file, state) {
      const row = document.createElement("div");
      row.className = "file-row";
      row.innerHTML = `<b></b><small></small>`;
      row.querySelector("b").textContent = displayPath(file);
      row.querySelector("small").textContent = state;
      fileListEl.append(row);
      return row;
    }

    async function renderFile(file) {
      if (extensionOf(file.name) === "pdf") {
        return renderPdf(file);
      }
      return [await renderImage(file, displayPath(file))];
    }

    async function renderPdf(file) {
      const pdfjsLib = await loadPdfJs();
      const buffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
      const pages = [];

      for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
        const page = await pdf.getPage(pageNumber);
        const viewport = page.getViewport({ scale: 2 });
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        canvas.width = Math.ceil(viewport.width);
        canvas.height = Math.ceil(viewport.height);

        await page.render({ canvasContext: context, viewport }).promise;

        const url = canvas.toDataURL("image/png");
        pages.push(makePage(url, canvas.width, canvas.height, `${displayPath(file)} 第 ${pageNumber} 页`));
      }

      return pages;
    }

    async function renderImage(file, label) {
      const url = await readAsDataUrl(file);

      const img = new Image();
      img.src = url;
      await img.decode();
      return makePage(url, img.naturalWidth, img.naturalHeight, label);
    }

    function readAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("图片读取失败"));
        reader.readAsDataURL(file);
      });
    }

    function makePage(url, width, height, label) {
      const ratio = width / height;
      return {
        url,
        width,
        height,
        label,
        single: ratio < HALF_A4_RATIO
      };
    }

    function renderPrintPages(pages) {
      pagesEl.innerHTML = "";
      printSheets = makeSheets(pages).map(sheet => ({ ...sheet, selected: true }));

      for (let index = 0; index < printSheets.length; index++) {
        appendSheet(printSheets[index], index);
      }

      if (!pages.length) {
        pagesEl.innerHTML = '<div class="empty">没有可打印的发票页。</div>';
      }
    }

    function appendSheet(sheetData, index) {
      const { items, single } = sheetData;
      const sheet = document.createElement("article");
      sheet.className = single ? "sheet single" : "sheet";

      const selectLabel = document.createElement("label");
      selectLabel.className = "sheet-select";
      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = true;
      checkbox.addEventListener("change", () => {
        sheetData.selected = checkbox.checked;
        sheet.classList.toggle("excluded", !checkbox.checked);
        updateSelectionState();
      });
      selectLabel.append(checkbox, `选择第 ${index + 1} 页`);
      sheet.append(selectLabel);

      for (const item of items) {
        const slot = document.createElement("div");
        slot.className = "slot";

        const img = document.createElement("img");
        img.src = item.url;
        img.alt = item.label;
        slot.append(img);

        if (item.single) {
          const badge = document.createElement("div");
          badge.className = "badge";
          badge.textContent = "高度不适合二合一，已单独排版";
          slot.append(badge);
        }

        sheet.append(slot);
      }

      if (!single && items.length === 1) {
        const slot = document.createElement("div");
        slot.className = "slot";
        sheet.append(slot);
      }

      pagesEl.append(sheet);
    }

    function reset() {
      invoicePages = [];
      printSheets = [];
      fileInput.value = "";
      folderInput.value = "";
      pagesEl.innerHTML = '<div class="empty">导入后会在这里生成 A4 打印预览。</div>';
      fileListEl.innerHTML = "";
      fileCountEl.textContent = "0";
      pageCountEl.textContent = "0";
      warnCountEl.textContent = "0";
      printBtn.disabled = true;
      clearBtn.disabled = true;
      downloadBtn.disabled = true;
      statusEl.textContent = "等待导入文件或文件夹。";
    }

    async function downloadPreview() {
      const sheets = printSheets.filter(sheet => sheet.selected);
      if (!sheets.length) return;

      downloadBtn.disabled = true;
      statusEl.textContent = "正在生成 PDF...";

      try {
        const pageImages = [];

        for (const sheet of sheets) {
          pageImages.push(await renderPdfPageImage(sheet));
        }

        const blob = new Blob([buildPdf(pageImages)], { type: "application/pdf" });
        saveBlob(blob, "发票合并打印.pdf");
        statusEl.textContent = `完成：已生成 ${sheets.length} 页 PDF。`;
      } catch (error) {
        statusEl.textContent = `下载失败：${error.message}`;
      } finally {
        updateSelectionState();
      }
    }

    function updateSelectionState() {
      const selectedCount = printSheets.filter(sheet => sheet.selected).length;
      printBtn.disabled = selectedCount === 0;
      downloadBtn.disabled = selectedCount === 0;
      statusEl.textContent = selectedCount
        ? `已选择 ${selectedCount}/${printSheets.length} 张 A4 页。`
        : "未选择要打印或下载的 A4 页。";
    }

    function makeSheets(pages) {
      const sheets = [];
      const queue = [];
      const pendingSingles = [];

      for (const page of pages) {
        if (page.single) {
          if (queue.length) {
            pendingSingles.push(page);
          } else {
            sheets.push({ items: [page], single: true });
          }
        } else {
          queue.push(page);
          if (queue.length === 2) {
            flushDownloadPair(sheets, queue);
            for (const pending of pendingSingles.splice(0)) {
              sheets.push({ items: [pending], single: true });
            }
          }
        }
      }

      for (const pending of pendingSingles) {
        sheets.push({ items: [pending], single: true });
      }
      flushDownloadPair(sheets, queue);
      return sheets;
    }

    function flushDownloadPair(sheets, queue) {
      if (!queue.length) return;
      sheets.push({ items: queue.splice(0, 2), single: false });
    }

    async function renderPdfPageImage(sheet) {
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");
      canvas.width = PDF_CANVAS_WIDTH;
      canvas.height = PDF_CANVAS_HEIGHT;

      context.fillStyle = "#fff";
      context.fillRect(0, 0, canvas.width, canvas.height);

      const slotHeight = sheet.single ? canvas.height : canvas.height / 2;

      for (let index = 0; index < sheet.items.length; index++) {
        const item = sheet.items[index];
        const image = await loadImage(item.url);
        const padding = Math.round(canvas.width * (8 / 210));
        const x = padding;
        const y = index * slotHeight + padding;
        const width = canvas.width - padding * 2;
        const height = slotHeight - padding * 2;
        const scale = Math.min(width / image.naturalWidth, height / image.naturalHeight);
        const imageWidth = image.naturalWidth * scale;
        const imageHeight = image.naturalHeight * scale;

        context.drawImage(
          image,
          x + (width - imageWidth) / 2,
          y + (height - imageHeight) / 2,
          imageWidth,
          imageHeight
        );
      }

      if (!sheet.single) {
        context.setLineDash([8, 8]);
        context.strokeStyle = "#c4ccd8";
        context.beginPath();
        context.moveTo(0, slotHeight);
        context.lineTo(canvas.width, slotHeight);
        context.stroke();
      }

      return {
        width: canvas.width,
        height: canvas.height,
        bytes: dataUrlToBytes(canvas.toDataURL("image/jpeg", .92))
      };
    }

    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error("图片加载失败"));
        image.src = url;
      });
    }

    function buildPdf(images) {
      const encoder = new TextEncoder();
      const chunks = [];
      const offsets = [0];
      let length = 0;
      let nextObject = 1;

      function pushAscii(text) {
        pushBytes(encoder.encode(text));
      }

      function pushBytes(bytes) {
        chunks.push(bytes);
        length += bytes.length;
      }

      function beginObject(id) {
        offsets[id] = length;
        pushAscii(`${id} 0 obj\n`);
      }

      pushAscii("%PDF-1.4\n");

      const catalogObject = nextObject++;
      const pagesObject = nextObject++;
      const pageObjects = images.map(() => nextObject++);
      const contentObjects = images.map(() => nextObject++);
      const imageObjects = images.map(() => nextObject++);

      beginObject(catalogObject);
      pushAscii(`<< /Type /Catalog /Pages ${pagesObject} 0 R >>\nendobj\n`);

      beginObject(pagesObject);
      pushAscii(`<< /Type /Pages /Kids [${pageObjects.map(id => `${id} 0 R`).join(" ")}] /Count ${images.length} >>\nendobj\n`);

      for (let i = 0; i < images.length; i++) {
        beginObject(pageObjects[i]);
        pushAscii(`<< /Type /Page /Parent ${pagesObject} 0 R /MediaBox [0 0 ${A4_WIDTH_PT} ${A4_HEIGHT_PT}] /Resources << /XObject << /Im0 ${imageObjects[i]} 0 R >> >> /Contents ${contentObjects[i]} 0 R >>\nendobj\n`);

        const content = `q\n${A4_WIDTH_PT} 0 0 ${A4_HEIGHT_PT} 0 0 cm\n/Im0 Do\nQ\n`;
        const contentBytes = encoder.encode(content);

        beginObject(contentObjects[i]);
        pushAscii(`<< /Length ${contentBytes.length} >>\nstream\n`);
        pushBytes(contentBytes);
        pushAscii("endstream\nendobj\n");

        beginObject(imageObjects[i]);
        pushAscii(`<< /Type /XObject /Subtype /Image /Width ${images[i].width} /Height ${images[i].height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${images[i].bytes.length} >>\nstream\n`);
        pushBytes(images[i].bytes);
        pushAscii("\nendstream\nendobj\n");
      }

      const xrefOffset = length;
      pushAscii(`xref\n0 ${nextObject}\n0000000000 65535 f \n`);

      for (let id = 1; id < nextObject; id++) {
        pushAscii(`${String(offsets[id]).padStart(10, "0")} 00000 n \n`);
      }

      pushAscii(`trailer\n<< /Size ${nextObject} /Root ${catalogObject} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);

      const output = new Uint8Array(length);
      let offset = 0;
      for (const chunk of chunks) {
        output.set(chunk, offset);
        offset += chunk.length;
      }
      return output;
    }

    function dataUrlToBytes(dataUrl) {
      const base64 = dataUrl.split(",")[1];
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    function saveBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.append(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function extensionOf(name) {
      return name.split(".").pop().toLowerCase();
    }

    function displayPath(file) {
      return file.webkitRelativePath || file.relativePath || file.name;
    }
  </script>
</body>
